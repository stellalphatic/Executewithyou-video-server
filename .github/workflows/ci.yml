name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check compilation
        run: cargo check --workspace

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: allstrm
          POSTGRES_PASSWORD: allstrm
          POSTGRES_DB: allstrm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://allstrm:allstrm@localhost:5432/allstrm_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-for-ci
      RUN_MIGRATIONS: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-

      - name: Run migrations
        run: |
          cargo install sqlx-cli --no-default-features --features postgres || true
          sqlx migrate run

      - name: Run tests
        run: cargo test --workspace --verbose

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Build release binaries
        run: cargo build --workspace --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: allstrm-binaries
          path: |
            target/release/allstrm-gateway
            target/release/allstrm-core
            target/release/allstrm-sfu
            target/release/allstrm-stream
            target/release/allstrm-storage
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit || true

      - name: Run security audit
        run: cargo audit
        continue-on-error: true  # Don't fail CI on audit warnings

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.gateway
          push: true
          tags: ghcr.io/${{ github.repository }}/gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Core
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.core
          push: true
          tags: ghcr.io/${{ github.repository }}/core:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push SFU
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.sfu
          push: true
          tags: ghcr.io/${{ github.repository }}/sfu:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Stream
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.stream
          push: true
          tags: ghcr.io/${{ github.repository }}/stream:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Storage
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.storage
          push: true
          tags: ghcr.io/${{ github.repository }}/storage:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
