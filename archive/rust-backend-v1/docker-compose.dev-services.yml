# ALLSTRM Development Stack with Hot Reload
# 
# Usage: 
#   docker compose -f docker-compose.dev-services.yml up -d
#   
# This compose file enables hot reload for all Rust services using cargo-watch.
# Source code is mounted as volumes, so changes are detected automatically.
#
# Services will rebuild automatically when you save files in:
#   - services/gateway/src/
#   - services/core/src/
#   - services/sfu/src/
#   - services/stream/src/
#   - services/storage/src/
#   - services/common/src/
#   - services/protocol/src/

services:
  # ============================================================================
  # Infrastructure Services
  # ============================================================================

  postgres:
    image: supabase/postgres:15.8.1.060
    container_name: allstrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/init/00-init.sql:/docker-entrypoint-initdb.d/01-supabase.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - listen_addresses=*

  supabase-auth:
    image: supabase/gotrue:v2.99.0
    container_name: allstrm-supabase-auth
    restart: unless-stopped
    ports:
      - "9999:9999"
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://localhost:8000
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:postgres@postgres:5432/postgres
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: "development-secret-change-in-production"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@localhost
      GOTRUE_SMTP_HOST: inbucket
      GOTRUE_SMTP_PORT: 2500
      GOTRUE_SMTP_SENDER_NAME: Allstrm
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  supabase-kong:
    image: kong:2.8.1
    container_name: allstrm-supabase-kong
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8443:8443"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./supabase/kong.yml:/var/lib/kong/kong.yml:ro
    depends_on:
      supabase-auth:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "kong", "health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  inbucket:
    image: inbucket/inbucket:latest
    container_name: allstrm-inbucket
    restart: unless-stopped
    ports:
      - "9003:9000"
      - "2500:2500"

  redis:
    image: redis:7-alpine
    container_name: allstrm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: allstrm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: allstrm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set myminio http://minio:9000 minioadmin minioadmin; mc mb myminio/allstrm --ignore-existing; mc anonymous set download myminio/allstrm/hls; exit 0; "

  # ============================================================================
  # ALLSTRM Microservices - HOT RELOAD ENABLED
  # ============================================================================

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile.dev
    container_name: allstrm-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Mount source code for hot reload
      - ./Cargo.toml:/app/Cargo.toml:ro
      - ./Cargo.lock:/app/Cargo.lock:ro
      - ./services:/app/services
      # Use named volume for target directory to avoid slow builds
      - gateway_target:/app/target
    environment:
      RUST_LOG: debug
      RUST_BACKTRACE: 1
      GATEWAY_PORT: "8080"
      CORE_SERVICE_URL: "http://core:8081"
      SFU_SERVICE_URL: "http://sfu:8082"
      STREAM_SERVICE_URL: "http://stream:8083"
      STORAGE_SERVICE_URL: "http://storage:8084"
      GATEWAY_JWT_SECRET: "development-secret-change-in-production"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      - redis
      - core
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  core:
    build:
      context: .
      dockerfile: services/core/Dockerfile.dev
    container_name: allstrm-core
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      # Mount source code for hot reload
      - ./Cargo.toml:/app/Cargo.toml:ro
      - ./Cargo.lock:/app/Cargo.lock:ro
      - ./services:/app/services
      # Use named volume for target directory to avoid slow builds
      - core_target:/app/target
    environment:
      RUST_LOG: debug
      RUST_BACKTRACE: 1
      CORE_PORT: "8081"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/postgres"
      DATABASE_POOL_SIZE: "10"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "development-secret-change-in-production"
      SFU_SERVICE_URL: "http://sfu:8082"
      STREAM_SERVICE_URL: "http://stream:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  sfu:
    build:
      context: .
      dockerfile: services/sfu/Dockerfile.dev
    container_name: allstrm-sfu
    restart: unless-stopped
    ports:
      - "8082:8082"
      - "10000-10100:10000-10100/udp"
    volumes:
      # Mount source code for hot reload
      - ./Cargo.toml:/app/Cargo.toml:ro
      - ./Cargo.lock:/app/Cargo.lock:ro
      - ./services:/app/services
      # Use named volume for target directory to avoid slow builds
      - sfu_target:/app/target
    environment:
      RUST_LOG: debug
      RUST_BACKTRACE: 1
      SFU_PORT: "8082"
      PUBLIC_IP: "127.0.0.1"
      STUN_SERVER: "stun:stun.l.google.com:19302"
      TURN_SERVER: ""
      TURN_USERNAME: ""
      TURN_PASSWORD: ""
      REDIS_URL: "redis://redis:6379"
      CORE_SERVICE_URL: "http://core:8081"
    depends_on:
      - redis
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  stream:
    build:
      context: .
      dockerfile: services/stream/Dockerfile.dev
    container_name: allstrm-stream
    restart: unless-stopped
    ports:
      - "8083:8083"
      - "1935:1935"
    volumes:
      # Mount source code for hot reload
      - ./Cargo.toml:/app/Cargo.toml:ro
      - ./Cargo.lock:/app/Cargo.lock:ro
      - ./services:/app/services
      # Use named volume for target directory to avoid slow builds
      - stream_target:/app/target
      - hls_data:/tmp/allstrm/hls
    environment:
      RUST_LOG: debug
      RUST_BACKTRACE: 1
      STREAM_PORT: "8083"
      RTMP_PORT: "1935"
      HLS_OUTPUT_DIR: "/tmp/allstrm/hls"
      FFMPEG_PATH: "ffmpeg"
      HLS_SEGMENT_DURATION: "2"
      HLS_PLAYLIST_SIZE: "6"
      MAX_BITRATE: "6000"
      DEFAULT_RESOLUTION: "1920x1080"
      CORE_SERVICE_URL: "http://core:8081"
      STORAGE_SERVICE_URL: "http://storage:8084"
    depends_on:
      - core
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8083/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  storage:
    build:
      context: .
      dockerfile: services/storage/Dockerfile.dev
    container_name: allstrm-storage
    restart: unless-stopped
    ports:
      - "8084:8084"
    volumes:
      # Mount source code for hot reload
      - ./Cargo.toml:/app/Cargo.toml:ro
      - ./Cargo.lock:/app/Cargo.lock:ro
      - ./services:/app/services
      # Use named volume for target directory to avoid slow builds
      - storage_target:/app/target
    environment:
      RUST_LOG: debug
      RUST_BACKTRACE: 1
      STORAGE_PORT: "8084"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/postgres"
      DATABASE_POOL_SIZE: "10"
      S3_ENDPOINT: "http://minio:9000"
      S3_BUCKET: "allstrm"
      S3_REGION: "us-east-1"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      PRESIGNED_URL_EXPIRY_SECS: "3600"
      MAX_UPLOAD_SIZE_MB: "500"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8084/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ============================================================================
  # Frontend (Next.js) - Development with Hot Reloading
  # ============================================================================

  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile.dev
    container_name: allstrm-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot reloading
      - ./frontend-next:/app
      # Use anonymous volume for node_modules to prevent overwriting
      - /app/node_modules
      - /app/.next
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_SUPABASE_URL=http://localhost:8000
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      - NEXT_PUBLIC_ALLSTRM_WS_URL=ws://localhost:8080
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_SFU_URL=http://localhost:8080/api/v1/sfu
    depends_on:
      - gateway
      - sfu
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# ============================================================================
# Volumes - Named volumes for Rust target directories (speeds up builds)
# ============================================================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  hls_data:
    driver: local
  # Rust target directories - preserves compiled artifacts between restarts
  gateway_target:
    driver: local
  core_target:
    driver: local
  sfu_target:
    driver: local
  stream_target:
    driver: local
  storage_target:
    driver: local

# ============================================================================
# Networks
# ============================================================================

networks:
  default:
    name: allstrm-network
    driver: bridge
