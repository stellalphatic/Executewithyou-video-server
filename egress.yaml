# LiveKit Egress Configuration for ALLSTRM
# Handles recording and RTMP streaming to destinations
# Documentation: https://docs.livekit.io/egress/overview/

api_key: devkey
api_secret: devsecret
ws_url: ws://livekit:7880

# Redis for job queueing
redis:
  address: redis:6379

# Health check port
health_port: 9090

# CPU costs for concurrent encoding jobs
cpu_cost:
  track_composite_cpu_cost: 2.0
  track_cpu_cost: 1.0
  room_composite_cpu_cost: 3.0
  web_cpu_cost: 4.0

# S3-compatible storage for recordings
s3:
  access_key: minioadmin
  secret: minioadmin
  region: us-east-1
  endpoint: http://minio:9000
  bucket: recordings
  force_path_style: true

# For production with Cloudflare R2:
# s3:
#   access_key: ${R2_ACCESS_KEY}
#   secret: ${R2_SECRET_KEY}
#   endpoint: https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
#   bucket: allstrm-recordings
#   force_path_style: true

logging:
  level: info
