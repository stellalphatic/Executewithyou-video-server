###
### API Routes
###
services:
  ## Auth Service (GoTrue) - FIXED: Using correct container name
  - name: auth-v1
    url: http://allstrm-supabase-auth:9999/
    routes:
      - name: auth-v1-route
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false

  ## Auth Admin Service - FIXED: Using correct container name
  - name: auth-v1-admin
    url: http://allstrm-supabase-auth:9999/admin/
    routes:
      - name: auth-v1-admin-route
        strip_path: true
        paths:
          - /auth/v1/admin/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Authorization
        - Content-Length
        - Content-Type
        - Date
        - X-Client-Info
        - apikey
      exposed_headers:
        - X-Supabase-Api-Version
      credentials: true
      max_age: 3600